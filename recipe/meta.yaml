{% set name = "geodatasets" %}
{% set version = "2026.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 28259126b58c8efd3119536038b563a178c8a7400a1d6d307460aae0f7f945c3

build:
  number: 0
  skip: true  # [py<38]
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools-scm >=6.2
  run:
    - python
    - pooch

# assert gdf.geom_type.str.endswith(dataset.geometry_type).all()
# E AssertionError: assert np.False_
{% set deselect_tests = [
  "--deselect=geodatasets/tests/test_data.py::test_data_exists"
]%}
test:
  imports:
    - geodatasets.data
    - geodatasets
  source_files:
    - geodatasets/tests
  commands:
    - pip check
    - pytest geodatasets/tests -v {{ deselect_tests | join(' ') }}
  requires:
    - pip
    - pytest
    - geopandas
    - pyogrio
    - pandas

about:
  home: https://github.com/geopandas/geodatasets
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Spatial data examples
  description: |
    Fetch links or download and cache spatial data example files. The geodatasets
    contains an API on top of a JSON with metadata of externally hosted datasets
    containing geospatial information useful for illustrative and educational purposes.
  doc_url: https://geodatasets.readthedocs.io/
  dev_url: https://github.com/geopandas/geodatasets

extra:
  recipe-maintainers:
    - martinfleis
